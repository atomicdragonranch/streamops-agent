# StreamOps Processor Configuration
# Override via environment variables (UPPERCASE_UNDERSCORED) or CLI args (--key=value).
# Flink's ParameterTool resolves: CLI args > env vars > this file.

# Kafka connectivity
kafka.bootstrap=localhost:9092
kafka.input.topic=stream-events
kafka.alert.topic=stream-alerts
kafka.group.id=streamops-processor

# Checkpointing
flink.checkpoint.interval.ms=30000

# Watermark strategy
flink.watermark.max.out.of.orderness.seconds=5

# Anomaly detection thresholds
anomaly.latency.threshold.ms=200.0
anomaly.backpressure.threshold=0.5
anomaly.checkpoint.threshold.ms=30000.0
anomaly.error.rate.threshold=0.2
anomaly.heap.threshold.percent=85.0
anomaly.consumer.lag.threshold=10000.0

# EMA (exponential moving average) smoothing factor: 0.0 = ignore new values, 1.0 = no smoothing
anomaly.ema.alpha=0.1

# Minimum event count before error rate calculation triggers
anomaly.error.rate.min.events=10

# Log severity threshold for error counting (Protobuf enum: 0=UNKNOWN, 1=DEBUG, 2=INFO, 3=WARN, 4=ERROR, 5=FATAL)
anomaly.log.severity.threshold=3
