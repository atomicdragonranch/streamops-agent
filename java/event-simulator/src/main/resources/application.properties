# StreamOps Event Simulator Configuration
# Override via environment variables: KAFKA_BOOTSTRAP, KAFKA_TOPIC, etc.

# Kafka connectivity
kafka.bootstrap=localhost:9092
kafka.topic=stream-events

# Kafka producer tuning
kafka.producer.acks=1
kafka.producer.linger.ms=5
kafka.producer.batch.size=16384

# Scheduler
simulator.thread.pool.size=4
simulator.shutdown.timeout.seconds=5

# Generator intervals (seconds)
simulator.metric.interval.seconds=1
simulator.log.interval.seconds=2
simulator.heartbeat.interval.seconds=5
simulator.progress.interval.seconds=10

# Scenario durations (seconds)
scenario.latency-spike.duration.seconds=30
scenario.throughput-drop.duration.seconds=45
scenario.error-burst.duration.seconds=20
scenario.backpressure.duration.seconds=40
scenario.checkpoint-timeout.duration.seconds=60
scenario.memory-pressure.duration.seconds=35

# Log generator probabilities
log.error.burst.probability=0.6
log.normal.error.probability=0.05
log.stacktrace.probability=0.5
log.debug.probability=0.3

# Metric generator ranges (normal operation)
metric.throughput.normal.min=5000
metric.throughput.normal.max=15000
metric.latency.normal.min=1
metric.latency.normal.max=50
metric.backpressure.normal.min=0.0
metric.backpressure.normal.max=0.1
metric.checkpoint.normal.min=500
metric.checkpoint.normal.max=5000
metric.heap.normal.min=30
metric.heap.normal.max=70
metric.consumer.lag.normal.min=0
metric.consumer.lag.normal.max=1000

# Metric generator ranges (anomaly state)
metric.throughput.anomaly.min=10
metric.throughput.anomaly.max=100
metric.latency.anomaly.min=500
metric.latency.anomaly.max=5000
metric.backpressure.anomaly.min=0.7
metric.backpressure.anomaly.max=1.0
metric.checkpoint.anomaly.min=30000
metric.checkpoint.anomaly.max=120000
metric.heap.anomaly.min=85
metric.heap.anomaly.max=99
metric.consumer.lag.anomaly.min=50000
metric.consumer.lag.anomaly.max=500000
